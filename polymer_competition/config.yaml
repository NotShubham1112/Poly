# =============================================================================
# Polymer Competition – Global Configuration
# =============================================================================
# This file holds project-wide settings. Model-specific hyperparameters
# live under training/configs/ and models/polychain/configs/.

project:
  name: "polymer_competition"
  version: "1.1.0"

paths:
  data_dir: "data/"
  features_dir: "features/"
  models_dir: "models/"
  training_dir: "training/"
  predictions_dir: "predictions/"
  outputs_dir: "outputs/"
  checkpoints_dir: "outputs/checkpoints/"
  logs_dir: "outputs/logs/"
  submissions_dir: "outputs/submissions/"
  reports_dir: "reports/"

seed:
  global: 42
  numpy: 42
  torch: 42
  python: 42
  xgboost: 42
  catboost: 42
  lightgbm: 42

deterministic: true

data:
  smiles_col: "smiles"
  id_col: "id"
  target_col: "target"
  target_type: "target_type"
  fail_policy: "warn"

features:
  polymer_descriptors: true
  interaction_features: false
  use_embeddings: false
  embedding_model: null

targets:
  tg:
    type: "tg"
  egc:
    type: "egc"

cv:
  n_folds: 5
  split_type: "group"
  group_strategy: "scaffold"

training:
  amp: true
  gradient_checkpointing: true
  num_workers: 2
  pin_memory: true
  prefetch_factor: 2
  batch_size_search: true
  grad_accumulation_steps: 2

device:
  use_cuda: true
  gpu_id: 0

experiment:
  version: "v1"

ensemble:
  strategy: "auto"
  stage2_threshold: 0.002
  min_weight: 0.0
  max_weight: 1.0

model_types:
  polychain:
    config: "models/polychain/configs/base.yaml"
  polychain_deep:
    extends: "models/polychain/configs/base.yaml"
    overrides:
      n_backbone_layers: 6
      n_hamf_layers: 3
      hidden_dim: 384
  polychain_wide:
    extends: "models/polychain/configs/base.yaml"
    overrides:
      hidden_dim: 512
  polychain_light:
    extends: "models/polychain/configs/base.yaml"
    overrides:
      n_backbone_layers: 3
      n_hamf_layers: 1
      hidden_dim: 128

logging:
  level: "INFO"
  tensorboard: false
  csv_log: true
