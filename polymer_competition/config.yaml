# =============================================================================
# Polymer Competition – Global Configuration
# =============================================================================
# This file holds project-wide settings. Model-specific hyperparameters
# live under training/configs/ and models/polychain/configs/.

project:
  name: "polymer_competition"
  version: "1.1.0"

paths:
  data_dir: "data/"
  features_dir: "features/"
  models_dir: "models/"
  training_dir: "training/"
  predictions_dir: "predictions/"
  outputs_dir: "outputs/"
  checkpoints_dir: "outputs/checkpoints/"
  logs_dir: "outputs/logs/"
  submissions_dir: "outputs/submissions/"
  reports_dir: "reports/"

seed:
  global: 42
  numpy: 42
  torch: 42
  python: 42
  xgboost: 42
  catboost: 42
  lightgbm: 42

deterministic: true

data:
  smiles_col: "smiles"
  id_col: "id"
  target_col: "target"
  target_type: "target_type"
  fail_policy: "warn"

targets:
  tg:
    type: "tg"
  egc:
    type: "egc"

cv:
  n_folds: 5
  split_type: "group"
  group_strategy: "scaffold"

device:
  use_cuda: true
  gpu_id: 0

experiment:
  version: "v1"

ensemble:
  strategy: "inverse_rmse"
  min_weight: 0.0
  max_weight: 1.0

logging:
  level: "INFO"
  tensorboard: false
  csv_log: true
